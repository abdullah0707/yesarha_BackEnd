version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: yesarha_postgres
    environment:
      POSTGRES_USER: yesarha
      POSTGRES_PASSWORD: yesarha
      POSTGRES_DB: yesarha_core
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yesarha -d yesarha_core"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: yesarha_ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  backend:
    build: .
    container_name: yesarha_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://yesarha:yesarha@postgres:5432/yesarha_core
      USE_SQLITE_FALLBACK: "false"
      OLLAMA_BASE_URL: http://ollama:11434
      DEFAULT_MODEL: qwen3:8b
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change_this_to_a_strong_random_secret}
      CORS_ORIGINS: '["*"]'
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
